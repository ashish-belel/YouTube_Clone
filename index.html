<!DOCTYPE html>
<html>

<head>
  <title>
    Youtube clone
  </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/general.css">
  <link rel="stylesheet" href="styles/header.css">
  <link rel="stylesheet" href="styles/video.css">
  <link rel="stylesheet" href="styles/sidebar.css">
  <link rel="stylesheet" href="styles/responsive.css">
</head>

<body>
  <header class="header">
    <!--LEFT------------------------------------------------------->
    <div class="left-section">
      <nav class="navbar">
        <input type="checkbox" id="check">
        <label for="check" class="hamburger" id="menu-btn">
          <span></span>
          <span></span>
          <span></span>
        </label>
        <ul>
          <li>Home</li>
          <li>Shorts</li>
          <li>Subscription</li>
          <li>Library</li>
        </ul>
      </nav>
      <img class="yt-logo" src="assets/icons/youtube-logo.svg">
    </div>
    <!-------------------------MIDDLE-->
    <div class="middle-section">
      <input class="search-bar" type="text" placeholder="Search">
      <button class="search-button">
        <img class="search-icon" src="assets/icons/search.svg">
        <div class="tooltip">Search</div>
      </button>
      <button class="vsearch-button">
        <img class="v-search-icon" src="assets/icons/voice-search-icon.svg">
        <div class="tooltip">Search with your voice</div>
      </button>
    </div>
    <!-------------------RIGHT-->
    <div class="right-section">
      <div class="upload-icon-container"><img class="upload-icon" src="assets/icons/upload.svg">
        <div class="tooltip">Create</div>
      </div>
      <div class="yt-container"><img class="yt-app-icon" src="assets/icons/youtube-apps.svg">
        <div class="tooltip">YouTube Apps</div>
      </div>
      <div class="notif-icon-container">
        <img class="notif-icon" src="assets/icons/notifications.svg">
        <div class="notif-count">3</div>
        <div class="tooltip">Notifications</div>
      </div>
      <img class="user-icon" src="assets/images/channel-1.jpeg">
    </div>
    <!--SIDEBAR-------------------------------------->
    <nav class="sidebar">
      <div class="sidebar-link">
        <img src="assets/icons/home.svg">
        <div>Home</div>
      </div>
      <div class="sidebar-link">
        <img src="assets/icons/explore.svg">
        <div>Explore</div>
      </div>
      <div class="sidebar-link">
        <img src="assets/icons/subscriptions.svg">
        <div>Subscriptions</div>
      </div>
      <div class="sidebar-link">
        <img src="assets/icons/originals.svg">
        <div>Originals</div>
      </div>
      <div class="sidebar-link">
        <img src="assets/icons/youtube-music.svg">
        <div>Youtube Music</div>
      </div>
      <div class="sidebar-link">
        <img src="assets/icons/library.svg">
        <div>Library</div>
      </div>
    </nav>
  </header>
  <!--MAIN---------------------------------------------------------------->
  <main>
    <section class="v-grid" id="video-container"></section>
  </main>

  <!-- <script src="scripts/data.js"></script> -->
  <script src="scripts/render.js"></script>
  <script src="scripts/events.js"></script>
  <script src="scripts/app.js"></script>
</body>

</html>
